#########################################################################################
# SNOWY x SLCHRIS HYBRID | ULTRA-MODERN V2 | GENTOO 9999 | NO ERRORS EDITION
#########################################################################################

# --- Мониторы ---
monitor=, 1920x1080@100, auto, 1.2
xwayland {
    force_zero_scaling = true
}

debug {
    disable_logs = true
    disable_scale_checks = true
    suppress_errors = true # Вот эта строка — твой главный щит от красных полосок
}

# --- NVIDIA FIXES ---
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
cursor {
    no_hardware_cursors = true
}

# --- Автозапуск ---
exec-once = dbus-update-activation-environment --all
exec-once = gentoo-pipewire-launcher
exec-once = wpctl set-volume @DEFAULT_AUDIO_SINK@ 78%
exec-once = swaybg -i ~/Downloads/wallpaper.png -m fill
exec-once = $HOME/.config/hypr/scripts/launch_waybar
exec-once = dunst
exec-once = mpd

# --- Ввод ---
input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
}

# --- Внешний вид ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(88C0D0ee) rgba(81A1C1ee) 45deg
    col.inactive_border = rgba(4C566Aaa)
    layout = dwindle
}

decoration {
    rounding = 12

    # Активное окно (в фокусе) — стало плотнее и солиднее
    active_opacity = 0.80    
    
    # Неактивные окна — остаются прозрачными "стекляшками"
    inactive_opacity = 0.60  

    blur {
        enabled = true
        size = 4           # Чуть-чуть добавили густоты, чтобы текст не плыл
        passes = 2         # Два прохода — золотая середина
        new_optimizations = true
        ignore_opacity = true 
        xray = true        
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(0, 0, 0, 0.45) # Тень погуще, чтобы разделять слои "стекла"
    }
}

# --- Анимации ---
animations {
    enabled = yes
    bezier = overshot, 0.13, 0.99, 0.29, 1.1
    animation = windows, 1, 4, overshot, slide
    animation = border, 1, 10, default
    animation = fade, 1, 10, default
    animation = workspaces, 1, 6, overshot, slidevert
}

# --- ПРАВИЛА ОКОН (СТРОГИЙ V2) ---
# Убираем все ошибки 83, 84, 85, 86, 87...
windowrulev2 = float, class:^(file_progress)$
windowrulev2 = float, class:^(confirm)$
windowrulev2 = float, class:^(dialog)$
windowrulev2 = float, class:^(download)$
windowrulev2 = float, class:^(notification)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = idleinhibit focus, class:^(mpv)$
layerrule = stayfocused, notifications
layerrule = layer_top, notifications

# Блюр и прозрачность для WezTerm (Тот самый сочный вид)
windowrulev2 = opacity 0.85 0.85, class:^(org.wezfurlong.wezterm)$
windowrulev2 = blur, class:^(org.wezfurlong.wezterm)$

# --- Бинды ---
$mainMod = SUPER
$terminal = wezterm
$menu = wofi --show drun

bind = $mainMod, C, killactive,
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, thunar
bind = $mainMod, R, exec, $menu
bind = $mainMod, Space, togglefloating,
bind = $mainMod, F, fullscreen, 0

# Музыка
bind = $mainMod, M, exec, $terminal -e ncmpcpp
bind = $mainMod, P, exec, mpc toggle

# Скриншоты
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# Яркость
bindle = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Воркспейсы
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Перенос окон
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Мышь
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
